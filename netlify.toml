# Netlify configuration for TaskForge frontend (Next.js + bun)
# The @netlify/plugin-nextjs plugin handles SSR, ISR, and API routes.

[build]
  command   = "bun run build"
  publish   = ".next"

[build.environment]
  NODE_VERSION = "22"
  BUN_VERSION  = "1.3.9"

# @netlify/plugin-nextjs adapts Next.js output to Netlify Functions.
# Netlify automatically sets NETLIFY=true during builds — next.config.js
# uses this to disable `output: "standalone"` (which conflicts with the plugin).
[[plugins]]
  package = "@netlify/plugin-nextjs"

# Security / cache headers for static assets
[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"
